id: 23_product_component
title: PRODUCT/COMPONENT aggregation in isolation (sub-products, sub-components, harness split)
note: "Isolates the product/component mechanism: a deep composition-statement tree\nwith sub-PRODUCTS (powertrain), sub-COMPONENTS (motor->stator->...), and a\nharness SPLIT (carA's harness nests front/back; carB's does not) — the SAME\nsuperclass structure realised with different instance depth per car. Two car\nclasses under elvBEV exercise the recursive EQUAL-subclass-mean at the product\nlevel. Materials are trivial leaves (pureCu winding etc.).\n\nCopper per kg (path-product of best values):\n  carA (V0301030105, split harness)  = 0.42240\n  carB (V0301030105, single harness) = 0.53930\n  carC (V0301030101, battery-centric)= 0.14500\nClass-level copper:\n  V0301030105 = (carA + carB)/2                 = 0.480850  (EQUAL instance mean)\n  V0301030101 = carC                            = 0.145000\n  elvBEV      = (V0301030105 + V0301030101)/2   = 0.312925  (EQUAL subclass mean)\n"
