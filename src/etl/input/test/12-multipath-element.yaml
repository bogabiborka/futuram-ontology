id: "12_multipath_element"
title: "copper reaches the car via two components (fans out, paths sum)"
note: "Cu reaches the car via the motor AND the harness — two distinct granular paths that must SUM. Each component also carries a non-copper material so it genuinely fans out. car->motor->winding->Cu = 0.5*0.3*1.0 = 0.15; car->harness->cuwire->Cu = 0.5*0.6*1.0 = 0.30; total granular Cu = 0.45."

