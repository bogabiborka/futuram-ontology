id: 20f_multi_instance_both_unknowns
title: multi-instance aggregation WITH unknowns on BOTH instances
note: "Base scenario: two DISTINCT product instances — carA and carB — both of\nclass V0301030105, each with the granular chain\nproduct -> component -> material -> element (motor->winding->Cu and\nharness->cuwire->Cu), DIFFERENT values per instance, combined by the equal\n(unweighted) mean of the two instances.\n\nPLUS a nickel UNKNOWN on EACH instance. An unknown is a COARSE composition\nstatement (whole and part more than one level apart) whose bound exceeds the\ngranular path-product reaching that part; residual = coarse - granular, and\ncoarse statements are auto-excluded from conservation.\n\nEach car now carries a known ni trace in its winding (windingA->ni best 0.01,\nwindingB->ni best 0.01; cu dropped 1.0 -> 0.99 so cu+ni conserve to 1.0), and\na COARSE Product->Element nickel statement bound ABOVE that traced path:\n  carA: coarse carA->ni best 0.02\n  carB: coarse carB->ni best 0.03   <- DISTINCT from carA.\n\nKnown granular nickel reaching ni per instance (path-product of best values):\n  carA: (carA->motorA 0.50) * (motorA->windingA 0.30) * (windingA->ni 0.01)\n      = 0.0015\n  carB: (carB->motorB 0.40) * (motorB->windingB 0.35) * (windingB->ni 0.01)\n      = 0.0014\n\nResidual unknown nickel surviving into the picture (coarse - granular):\n  carA: 0.02 - 0.0015 = 0.0185\n  carB: 0.03 - 0.0014 = 0.0286\nBOTH residuals survive — the class aggregate must account for unknowns from\nevery instance, not just one.\n\nCopper drops on both cars because the ni trace displaces cu in each winding\n(winding cu 1.0 -> 0.99). The new class copper:\n  carA Cu = motor 0.50 * winding 0.30 * 0.99  +  harness 0.50 * cuwire 0.60 * 1.0\n          = 0.1485 + 0.300 = 0.4485\n  carB Cu = motor 0.40 * winding 0.35 * 0.99  +  harness 0.55 * cuwire 0.70 * 1.0\n          = 0.1386 + 0.385 = 0.5236\n  Cu(V0301030105) = (0.4485 + 0.5236) / 2 = 0.486050\n"
