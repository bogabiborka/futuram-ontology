id: "09_fine_gt_coarse"
title: "granular copper exceeds the coarse ceiling (cross-level overshoot, fans out)"
note: "the granular copper paths sum to 0.5 but the coarse car->Cu ceiling is only 0.3. The fine decomposition claims more copper than the direct measurement allows -> cross-level VIOLATION. Same fan-out as 07/08; only the coarse ceiling is set below the granular total."

