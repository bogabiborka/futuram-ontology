id: "04_overshoot"
title: "motor materials overshoot 1.0 (fans out)"
note: "the motor's two materials sum to a minimum of 1.2 (>1) — physically impossible, a conservation VIOLATION on the motor. The materials still fan out to >=2 elements (which conserve), so the overshoot is isolated to the motor level."

