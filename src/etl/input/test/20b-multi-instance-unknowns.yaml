id: 20b_multi_instance_unknowns
title: multi-instance aggregation WITH unknowns (coarse element bound above the known path)
note: "Scenario 20 (two V0301030105 instances aggregated to the class by the equal\n(unweighted) mean) PLUS a derivable UNKNOWN on carA. Adding a 0.01 nickel trace to windingA\ndisplaces that much copper (windingA cu 1.00->0.99), so:\n  carA Cu 0.4485, carB Cu 0.525  ->  Cu(V0301030105) = (0.4485 + 0.525)/2 = 0.486750\n  Ni(V0301030105) = equal-mean KNOWN nickel = (0.0015 + 0.0)/2 = 0.00075.\n(The 0.0185 unknown nickel is NOT in the known aggregate — it is the residual\nthe reconcile pipeline derives, see below.)\n\nThe unknown: carA carries a COARSE car->ni bound of 0.02 (Product->Element, a\nwhole-vehicle nickel figure) while only PART of that nickel is traced — windingA\nis highCuAlloys (a copper-nickel alloy, cu 0.99 + ni 0.01), so the known\ngranular nickel reaching carA\nis  car->motor->winding->ni = 0.50 * 0.30 * 0.01 = 0.0015. The coarse bound\n(0.02) exceeds the known path, so the pipeline must derive an unknown nickel\nresidual of 0.02 - 0.0015 = 0.0185, attributed as a fully-generic chain\ncar -> unknownComponent -> unknownMaterial -> ni. The coarse bound is EXCLUDED\nfrom carA's conservation (a parallel low-resolution view, not a sibling part),\nso carA still conserves. None of the unknown nodes are in the Turtle — the\nreconcile pipeline produces them.\n"
