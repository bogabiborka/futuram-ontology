id: 24b_multi_class_unknowns
title: multi-class aggregation WITH unknowns (coarse element bound above the known path)
note: 'Scenario 24 (multi-CLASS recursive aggregation: V0301030105 <- carA+carB by

  the EQUAL (unweighted) mean; V0301030101 <- carC; elvBEV = EQUAL mean of the two

  subclasses, NOT a flat instance pool) PLUS a derivable UNKNOWN on carC.


  The unknown lives on carC (class V0301030101, sole member). carC''s windingC is

  highCuAlloys (canonical Cu0.99/Ni0.01); that 0.01 nickel is the granular ni

  trace, with copper at 0.99 so the material still conserves. The known

  granular nickel reaching carC is the single traced path

  carC -> motorC -> windingC -> ni = 0.45 * 0.30 * 0.01 = 0.00135.

  carC also carries a COARSE carC->ni bound of 0.03 (Product->Element, skipping

  Component+Material — a whole-vehicle nickel figure). 0.03 > 0.00135, so the

  reconcile pipeline derives an unknown nickel residual of 0.03 - 0.00135 =

  0.02865, attributed as a fully-generic chain

  carC -> unknownComponent -> unknownMaterial -> ni. The coarse bound is

  EXCLUDED from carC''s conservation (a parallel low-resolution view, never a

  sibling part), so carC still conserves and never overshoots. None of the

  unknown nodes are in the Turtle — the pipeline produces them.


  Copper aggregation follows the scenario-24 mechanism; carC''s windingC is

  highCuAlloys (cu 0.99) carrying the ni trace, so carC''s

  copper is motorC*windingC*0.99 + harnessC*cuwireC*1.0

  = 0.45*0.30*0.99 + 0.50*0.30*1.0 = 0.13365 + 0.15 = 0.28365.

  Class-level copper: V0301030101 (carC alone) = 0.28365;

  V0301030105 (carA+carB) = 0.491575 (unchanged); elvBEV = the equal mean of the

  two subclasses = 0.387613.

  '
