id: "18_overshoot_all_levels"
title: "overshoot at EVERY level at once (Product, Component, Material)"
note: "one chain that VIOLATES conservation simultaneously at all three non-leaf levels: the car's components sum >1 (PRODUCT), the motor's materials sum >1 (COMPONENT), and the winding's elements sum >1 (MATERIAL). Proves the rule flags each overshooting whole independently — the verdict set is {car, motor, winding} and the conserving wholes (harness, steel, cuwire, sheath) are NOT flagged."

provenance:
  source: "FutuRaM composition datasheet (test)"
  agent: "FutuRaM test organisation"
  production: "forming"
  validFrom: "2020-01-01"
  validUntil: "2026-12-31"

nodes:
  car: {level: Product, class: V0301030105_Y2020, itemMass: 1000.0}
  motor: {level: Component, class: elvElectricMotor_Y2020, itemMass: 50.0}
  harness: {level: Component, class: wiringHarness_Y2020, itemMass: 50.0}
  winding: {level: Material, class: cupronickel}
  steel: {level: Material, class: lowCarbonSteel}
  cuwire: {level: Material, class: highCuAlloys}
  sheath: {level: Material, class: plasticComposites}
  cu: {level: Element, class: Copper}
  ni: {level: Element, class: Nickel}
  fe: {level: Element, class: Iron}
  c: {level: Element, class: Carbon}

statements:
  # PRODUCT overshoot: car components min 0.55 + 0.55 = 1.10 > 1.0
- {whole: car, part: motor, best: 0.575, lo: 0.55, hi: 0.60, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: car, part: harness, best: 0.575, lo: 0.55, hi: 0.60, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # COMPONENT overshoot: motor materials min 0.60 + 0.60 = 1.20 > 1.0
- {whole: motor, part: winding, best: 0.65, lo: 0.60, hi: 0.70, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: motor, part: steel, best: 0.65, lo: 0.60, hi: 0.70, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # harness materials conserve (NOT flagged)
- {whole: harness, part: cuwire, best: 0.6, lo: 0.58, hi: 0.62, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: harness, part: sheath, best: 0.38, lo: 0.36, hi: 0.40, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # MATERIAL overshoot: winding elements min 0.60 + 0.55 = 1.15 > 1.0
- {whole: winding, part: cu, best: 0.625, lo: 0.60, hi: 0.65, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: winding, part: ni, best: 0.575, lo: 0.55, hi: 0.60, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # steel / cuwire / sheath elements conserve (NOT flagged)
- {whole: steel, part: fe, best: 0.99, lo: 0.97, hi: 0.995, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: steel, part: c, best: 0.01, lo: 0.005, hi: 0.015, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: cuwire, part: cu, best: 0.99, lo: 0.98, hi: 0.995, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: cuwire, part: ni, best: 0.01, lo: 0.005, hi: 0.02, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: sheath, part: c, best: 0.99, lo: 0.97, hi: 0.995, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: sheath, part: cu, best: 0.01, lo: 0.005, hi: 0.015, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
