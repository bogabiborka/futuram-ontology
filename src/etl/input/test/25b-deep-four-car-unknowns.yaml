id: 25b_deep_four_car_unknowns
title: deep 4-car aggregation WITH unknowns (coarse element bounds above the known paths)
note: "This is scenario 25 (the DEEP 4-car capstone) PLUS two derivable nickel\nUNKNOWNS. Everything structural is identical to scenario 25 — FOUR real car\ninstances across THREE product subclasses of elvBEV, each with a DEEP and\nDIFFERENT composition-statement structure sharing the SAME superclass/level\ngrammar — exercising BOTH aggregation mechanisms at once:\n\n  * PRODUCT/COMPONENT recursion (composition-statement tree, equal-subclass\n    mean at parents, equal (unweighted) instance mean within a leaf class):\n      V0301030105 <- carA (SPLIT harness) + carB (single)\n      V0301030101 <- carC (battery-centric)\n      V0301030102 <- carD (power-electronics-centric)\n      elvBEV      <- the three subclasses (EQUAL mean, each once)\n    carA nests its harness into harnFA/harnBA (front/back); carB/carC/carD do\n    not — the SAME wiringHarness class realised at different instance depth.\n\n  * MATERIAL-family mass-weighted subClass rollup, on the cupronickel-vs-pureCu\n    axis: carA's and carD's motor windings are cupronickel (a ~15% nickel\n    copper alloy, subClass of otherCuAlloys under CuAndCuAlloys); every other\n    winding/cuwire/foil is pureCu. Both roll up under CuAndCuAlloys, so\n    aggregate_material_family('CuAndCuAlloys','Copper') pools them MASS-weighted\n    — distinct from the product-class copper totals above. Steel parts roll up\n    under steelAndSteelAlloys, Al under AlAndAlAlloys.\n\nCOPPER AGGREGATION IS UNCHANGED FROM 25. We add NO new copper or nickel traces;\nwe only add two COARSE whole-vehicle nickel statements (Product->Element, three\nlevels apart, hence automatically EXCLUDED from conservation). The oracle copper\nfigures are therefore the SAME as scenario 25:\n      Cu(V0301030105) = 0.476350   (EQUAL mean of carA, carB)\n      Cu(V0301030101) = 0.145000   (carC)\n      Cu(V0301030102) = 0.483337   (carD)\n      Cu(elvBEV)      = 0.368229   (EQUAL mean of the three subclasses)\n\nTHE UNKNOWNS. carA and carD are the two cupronickel cars: each ALREADY carries\na traced nickel granular path through its motor winding (windA->ni 0.15,\nwindD->ni 0.15). The known traced nickel reaching each whole is:\n      carA: ptA(0.4) * motorA(0.6) * statorA(0.5) * windA(0.5) * ni(0.15)\n            = 0.009 kg/kg  (lo-path 0.10 -> 0.006)\n      carD: drvtD(0.45) * motD(0.7) * statD(0.5) * windD(0.5) * ni(0.15)\n            = 0.0118125 kg/kg  (lo-path 0.10 -> 0.007875)\nWe now assert a COARSE whole-vehicle nickel bound on each car that EXCEEDS the\ntraced amount:\n      carA -> ni : 0.07 kg/kg  (coarse, > 0.009 known)\n      carD -> ni : 0.07 kg/kg  (coarse, > 0.0118125 known)\nThe residual (coarse - known granular) is the derivable UNKNOWN nickel, which\nthe pipeline materialises as car -> unknownComponent -> unknownMaterial -> ni.\nBecause both coarse bounds sit ABOVE their known granular paths, neither\novershoots, and each yields a positive unknown_min in coarse_fine().\n"
