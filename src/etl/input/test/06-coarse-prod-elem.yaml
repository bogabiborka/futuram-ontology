id: "06_coarse_prod_elem"
title: "coarse product->element, no granular aluminium path"
note: "car -> Aluminium measured directly (coarse, skips component+material). The car DOES fan out into real components/materials, but NONE of them carries aluminium — so granular-Al = 0 and the whole coarse value is unknown, needing unknownComponent + unknownMaterial to be chain-complete."

provenance:
  source: "FutuRaM composition datasheet (test)"
  agent: "FutuRaM test organisation"
  production: "forming"
  validFrom: "2020-01-01"
  validUntil: "2026-12-31"

nodes:
  car: {level: Product, class: V0301030105_Y2020, itemMass: 1000.0}
  motor: {level: Component, class: elvElectricMotor_Y2020, itemMass: 50.0}
  harness: {level: Component, class: wiringHarness_Y2020, itemMass: 50.0}
  winding: {level: Material, class: highCuAlloys}
  steel: {level: Material, class: lowCarbonSteel}
  cuwire: {level: Material, class: highCuAlloys}
  sheath: {level: Material, class: plasticComposites}
  cu: {level: Element, class: Copper}
  ni: {level: Element, class: Nickel}
  fe: {level: Element, class: Iron}
  c: {level: Element, class: Carbon}
  al: {level: Element, class: Aluminium}

statements:
  # COARSE: total aluminium in the car, directly (the headline of this scenario)
- {whole: car, part: al, best: 0.08, lo: 0.078, hi: 0.082, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # the car fans out into real components/materials — but NONE contains Al,
  # so the granular aluminium total is 0 and the coarse Al is fully unknown.
