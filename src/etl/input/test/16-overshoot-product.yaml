id: "16_overshoot_product"
title: "car components overshoot 1.0 (PRODUCT-level violation)"
note: "the car's two COMPONENTS sum to a minimum of 1.1 (>1) — a conservation VIOLATION at the PRODUCT level. Each component's own materials conserve, so the overshoot is isolated to the car (Product). Mirror of scenario 04 one level up: proves the rule fires on a Product whole, not only a Component."

