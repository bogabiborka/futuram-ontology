id: 21_multi_instance_mc
title: two instances of the same class, aggregated with SPREAD (Monte-Carlo)
note: "Same shape as scenario 20 (two V0301030105 instances aggregated to the class,\ncopper) but every statement now carries a SPREAD, so the two aggregation modes\nDIFFER in what they deliver:\n  * SIMPLE   -> the equal (unweighted) mean of the BEST values (a\n                single central number);\n  * MONTE-CARLO -> samples each statement from its distribution (triangular by\n                default, plus a normal and a beta here), path-multiplies, and\n                equal-mean-combines, producing a DISTRIBUTION summarised as\n                best (median) + a 5/95 percentile interval.\nThe MC median must converge to ~ the simple best value; the MC lo/hi give the\ninterval the simple mode cannot. Each instance counts once in the class mean.\nGround truth is computed by the oracle in both modes (seed-fixed for MC).\n"
