id: "13_layered_unknowns"
title: "layered unknowns at multiple depths (silver in the car)"
note: "the key scenario for the unknown planner. Silver (ag) is bounded at TWO depths: coarse car->ag = 0.5 and coarse motor->ag = 0.3, plus one fully-known granular path car->motor->contacts->ag = 0.2. The unknown therefore splits into THREE disjoint chains by depth: (a) fully known 0.2; (b) car->motor->unknownMaterial->ag = 0.1 (motor known, 0.3-0.2); (c) car->unknownComponent->unknownMaterial->ag = 0.2 (fully generic, 0.5-0.3). None of these unknown nodes are in the Turtle — the pipeline must derive them."

provenance:
  source: "FutuRaM composition datasheet (test)"
  agent: "FutuRaM test organisation"
  production: "forming"
  validFrom: "2020-01-01"
  validUntil: "2026-12-31"

nodes:
  car: {level: Product, class: V0301030105_Y2020, itemMass: 1000.0}
  motor: {level: Component, class: elvElectricMotor_Y2020, itemMass: 50.0}
  harness: {level: Component, class: wiringHarness_Y2020, itemMass: 50.0}
  contacts: {level: Material, class: AgAndAgAlloys}       # silver contacts (real, known)
  steel: {level: Material, class: steelAndSteelAlloys}
  cuwire: {level: Material, class: pureCu}
  sheath: {level: Material, class: thermoplastics}
  ag: {level: Element, class: Silver}
  fe: {level: Element, class: Iron}
  cu: {level: Element, class: Copper}
  c: {level: Element, class: Carbon}

statements:
  # car -> 2 components
- {whole: car, part: motor, best: 0.5, lo: 0.5, hi: 0.5, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: car, part: harness, best: 0.5, lo: 0.5, hi: 0.5, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # motor -> 2 materials (contacts carry the known silver)
- {whole: motor, part: contacts, best: 0.4, lo: 0.4, hi: 0.4, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: motor, part: steel, best: 0.5, lo: 0.5, hi: 0.5, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # harness -> 2 materials
- {whole: harness, part: cuwire, best: 0.6, lo: 0.6, hi: 0.6, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: harness, part: sheath, best: 0.3, lo: 0.3, hi: 0.3, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # contacts -> 2 elements; fully-known silver path = car->motor->contacts->ag
  #   = 0.5 * 0.4 * 0.5 = 0.10  (contacts are 50% silver)
- {whole: contacts, part: ag, best: 0.5, lo: 0.5, hi: 0.5, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: contacts, part: cu, best: 0.5, lo: 0.5, hi: 0.5, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: steel, part: fe, best: 1.0, lo: 1.0, hi: 1.0, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: cuwire, part: cu, best: 1.0, lo: 1.0, hi: 1.0, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: sheath, part: c, best: 1.0, lo: 1.0, hi: 1.0, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
