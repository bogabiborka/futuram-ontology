id: 21b_multi_instance_mc_unknowns
title: multi-instance MC aggregation WITH unknowns (coarse element bound above the known path)
note: 'Scenario 21 (two V0301030105 instances, every statement carrying a SPREAD so

  SIMPLE and MONTE-CARLO aggregation diverge) PLUS a derivable UNKNOWN on carA.


  To create the unknown, carA''s windingA gains a 0.01 nickel TRACE: its copper

  best/lo/hi each drop by 0.01 and its nickel rises by the same 0.01, so the

  winding-level cu + ni still conserves exactly as in scenario 21. The known

  granular nickel reaching carA along the structural path is

  carA -> motorA -> windingA -> ni (Product->Component->Material->Element),

  i.e. (carA->motorA) * (motorA->windingA) * (windingA->ni).


  carA also carries a COARSE car->ni bound of 0.02 (Product->Element, skipping

  Component and Material). Because the coarse 0.02 exceeds the known granular

  nickel, the pipeline derives an UNKNOWN nickel residual = 0.02 - known. The

  coarse statement is a parallel low-resolution view, so it is EXCLUDED from

  carA''s conservation and never causes overshoot. carB is untouched.

  Ground truth (both modes; the unknown residual) is computed by the oracle.

  '
