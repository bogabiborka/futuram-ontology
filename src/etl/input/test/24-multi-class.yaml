id: 24_multi_class
title: instances of TWO different classes, each aggregated to its own class AND their shared parent
note: "Multi-CLASS, RECURSIVE aggregation. Three instances of TWO product classes that\nshare a parent elvBEV (\"battery electric vehicle\" / electric car):\n  * V0301030105  <- carA + carB        (two members)\n  * V0301030101  <- carC               (sole member)   [subclass of elvBEV]\n  * elvBEV       <- the two SUBCLASSES above\ncarC reuses the SAME component/material/element classes; only its PRODUCT class\ndiffers. All three are distinct individuals. Every statement names its\ndistribution explicitly. The three cars are deliberately given DISTINCT\ncomposition values so each aggregation level resolves to its own number — no\ntwo classes coincide, so a per-class lookup that silently averaged or\ncross-contaminated would be caught.\n\nAggregation has TWO levels (this is the key thing the scenario tests):\n  * a LEAF class = the EQUAL (unweighted) mean of its OWN instances — each\n    instance counts ONCE (a class is the plain mean of its members);\n  * a PARENT class = the EQUAL (unweighted) mean of its direct SUBCLASSES'\n    aggregates — each subclass counts ONCE, regardless of instance count. This\n    recurses up the class tree.\n\nCopper per kg (path-product of best values), as resolved by the oracle:\n  V0301030105 = (carA + carB)/2  = 0.484187   (EQUAL instance mean)\n  V0301030101 = carC alone       = 0.24        (carC motor share 0.30, distinct)\n  elvBEV      = (V05 + V01)/2     = 0.362094    (EQUAL subclass mean)\nNote elvBEV (0.362094) deliberately DIFFERS from a flat instance-pool\n(carA+carB+carC)/3 — each subclass counts once regardless of how many\ninstances it has, so the test distinguishes the recursive rule from a flat\npool. The component motor share is likewise distinct per product: V05 = 0.45\n(mean of carA 0.5, carB 0.4), V01 = 0.30 (carC) — they do NOT coincide.\nSIMPLE gives one number per class; MONTE-CARLO gives best+interval per class.\n\nCOMBINED with the MATERIAL-FAMILY axis: carA's and carB's windings AND their\ncuwires are highCuAlloys (canonical Cu0.99/Ni0.01), while carC's winding and\ncuwire are genuinely pureCu (Cu1.0) — both subclasses of CuAndCuAlloys. (Steel\nparts are lowCarbonSteel for carA/carB and steelAndSteelAlloys for carC; the\nsheaths are plasticComposites for carA/carB carrying a Cu trace and\nthermoplastics for carC.) So this scenario exercises BOTH mechanisms at once:\nthe product recursion above AND the material-family mass-weighted rollup. Asking\nfor CuAndCuAlloys Cu pools the highCuAlloys + pureCu materials weighted by mass\n(aggregate_material_family('CuAndCuAlloys','Copper')), distinct from the\nproduct-class copper totals.\n"
