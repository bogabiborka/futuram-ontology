id: 20e_multi_instance_multielement_unknowns
title: multi-instance aggregation WITH multi-element unknowns (two elements coarse-bounded on one instance)
note: "BASE: two instances of the SAME class V0301030105 — carA and carB —\naggregated to the class by the equal (unweighted) mean, as in scenario 20.\n\nPLUS: TWO coexisting ELEMENT-level unknowns on carA, on two DIFFERENT\nelements, each producing its own independent unknown residual on one\ninstance:\n\n1. NICKEL unknown. A known ni trace is recorded inside the motor winding\n   (windingA->ni best 0.01; windingA->cu drops 1.0->0.99 so cu+ni conserve\n   to 1.0). The granular ni reaching carA via that traced path is\n     carA->motorA (0.5) * motorA->windingA (0.3) * windingA->ni (0.01)\n       = 0.0015 kg/kg.\n   A COARSE Product->Element statement carA->ni best 0.02 bounds total\n   nickel ABOVE that traced path. residual (unknown) = 0.02 - 0.0015\n     = 0.0185 kg/kg.\n\n2. SILVER unknown. There is NO silver anywhere in carA's granular chain,\n   so the known granular ag = 0. A COARSE Product->Element statement\n   carA->ag best 0.015 is therefore FULLY GENERIC: residual (unknown)\n     = 0.015 - 0.0 = 0.015 kg/kg.\n\nBoth coarse statements span more than one level (Product->Element) and are\nAUTO-EXCLUDED from conservation. Copper on carA drops slightly because the\nni trace displaces cu inside windingA (windingA->cu 1.0 -> 0.99).\n\nORIGINAL NOTE (base scenario 20) follows:\nTHE keystone aggregation scenario. Two DISTINCT product instances — carA and\ncarB — are BOTH of the same class V0301030105. They have the same KIND of\nchain (product -> component -> material -> element: motor->winding->Cu and\nharness->cuwire->Cu) but DIFFERENT values per instance. The class is the plain\n(equal, unweighted) mean of its member instances — each instance counts once.\n\nPer-instance copper per kg of car (path-product of best values). NOTE windingA\ncopper is now 0.99 because the ni trace above displaces 0.01 of cu inside it:\n  carA: motor 0.50 * winding 0.30 * 0.99 = 0.1485\n      + harness 0.50 * cuwire 0.60 * 1.0  = 0.300   -> 0.4485\n  carB: motor 0.40 * winding 0.35 * 1.0  = 0.140\n      + harness 0.55 * cuwire 0.70 * 1.0  = 0.385   -> 0.525\n\nClass-level copper = equal (unweighted) mean over the two instances:\n  Cu(V0301030105) = (0.4485 + 0.525) / 2 = 0.486750 kg/kg\n\nThis is the ClassCompositionStatement the Monte-Carlo aggregator must\nreproduce (best/central value; MC adds the spread). Every instance conserves\nindependently; the two share ONLY their class, not their individuals.\n"
