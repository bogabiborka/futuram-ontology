id: "14_deep_nested_unknowns"
title: "deep nested chain with unknowns at EVERY layer (silver)"
note: |
  A deep chain car -> powertrain (subproduct) -> motor -> stator (subcomponent)
  -> winding -> ag, with fan-out (>=2 children) at every non-leaf level, and a
  COARSE silver bound at FOUR depths (stator, motor, powertrain, car), each above
  the granular silver reaching it. The silver unknown therefore splits into a
  STACK of disjoint chains by depth:
    known      : car->powertrain->motor->stator->winding->ag      = 0.10
    stator     : car->powertrain->motor->stator->unknownMaterial->ag        (stator coarse - known under stator)
    motor      : car->powertrain->motor->unknownComponent->unknownMaterial->ag   (motor coarse - stator coarse)
    powertrain : car->powertrain->unknownComponent->unknownComponent->unknownMaterial->ag  (pt coarse - motor coarse)
    car        : car->unknownComponent->unknownComponent->unknownComponent->unknownMaterial->ag  (car coarse - pt coarse)
  ALL the unknown nodes are absent from the Turtle; the pipeline must derive them.
  The disjoint chains (known + every layer) must sum to the car coarse total.

provenance:
  source: "FutuRaM composition datasheet (test)"
  agent: "FutuRaM test organisation"
  production: "forming"
  validFrom: "2020-01-01"
  validUntil: "2026-12-31"

