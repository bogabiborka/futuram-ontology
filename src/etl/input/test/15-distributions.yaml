id: "15_distributions"
title: "every distribution kind on a conserving car (per-kind params)"
note: |
  Exercises the distribution model: each composition statement names a different
  Monte-Carlo distribution kind via `dist:` and supplies the parameters that kind
  requires. The interval's best value is the authored centre of the distribution
  (not derived from lo/hi); the per-kind parameters live on the distribution node.
    triangular -> lowerBound, upperBound (default to lo, hi)
    uniform    -> lowerBound, upperBound (default to lo, hi)
    normal     -> stdDev                 (mean = best value; NO min/max emitted)
    lognormal  -> logStdDev              (median = best value; NO min/max emitted)
    beta       -> alpha, beta            (NO min/max emitted)
    gamma      -> shapeParam, scaleParam (NO min/max emitted)
    weibull    -> shapeParam, scaleParam (NO min/max emitted)
  Bounded kinds (triangular, uniform) emit min/max and the conservation rule uses
  lo as their floor; centre-based kinds emit only the best value and the rule
  uses that best value as their floor (mirroring COALESCE(min, bestValue)).
  Everything conserves.

provenance:
  source: "FutuRaM composition datasheet (test)"
  agent: "FutuRaM test organisation"
  production: "forming"
  validFrom: "2020-01-01"
  validUntil: "2026-12-31"

nodes:
  car: {level: Product, class: V0301030105_Y2020, itemMass: 1000.0}
  motor: {level: Component, class: elvElectricMotor_Y2020, itemMass: 50.0}
  harness: {level: Component, class: wiringHarness_Y2020, itemMass: 50.0}
  winding: {level: Material, class: highCuAlloys}
  steel: {level: Material, class: lowCarbonSteel}
  cuwire: {level: Material, class: highCuAlloys}
  sheath: {level: Material, class: plasticComposites}
  cu: {level: Element, class: Copper}
  fe: {level: Element, class: Iron}
  ni: {level: Element, class: Nickel}
  c: {level: Element, class: Carbon}

statements:
  # car -> 2 components (default triangular: bounds = lo/hi)
- {whole: car, part: motor, best: 0.475, lo: 0.45, hi: 0.50, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: car, part: harness, best: 0.425, lo: 0.40, hi: 0.45, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # motor -> 2 materials; winding is NORMAL (mean=best=0.15, stdDev), steel UNIFORM
- {whole: motor, part: winding, best: 0.15, lo: 0.14, hi: 0.16, unit: kgkg, dist: normal, stdDev: 0.01, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: motor, part: steel, best: 0.62, lo: 0.60, hi: 0.64, unit: kgkg, dist: uniform, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # harness -> 2 materials; cuwire LOGNORMAL, sheath BETA
- {whole: harness, part: cuwire, best: 0.6, lo: 0.58, hi: 0.62, unit: kgkg, dist: lognormal, logStdDev: 0.10, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: harness, part: sheath, best: 0.38, lo: 0.36, hi: 0.40, unit: kgkg, dist: beta, alpha: 2.0, beta: 5.0, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # winding -> Cu + Ni; Cu is GAMMA, Ni triangular
- {whole: winding, part: cu, best: 0.99, lo: 0.985, hi: 0.995, unit: kgkg, dist: gamma, shapeParam: 9.0, scaleParam: 0.11, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: winding, part: ni, best: 0.01, lo: 0.005, hi: 0.015, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # steel -> Fe + C; Fe is WEIBULL, C triangular
- {whole: steel, part: fe, best: 0.99, lo: 0.985, hi: 0.995, unit: kgkg, dist: weibull, shapeParam: 5.0, scaleParam: 0.98, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: steel, part: c, best: 0.01, lo: 0.005, hi: 0.015, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # cuwire -> Cu + Ni (triangular)
- {whole: cuwire, part: cu, best: 0.99, lo: 0.985, hi: 0.995, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: cuwire, part: ni, best: 0.01, lo: 0.005, hi: 0.015, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
  # sheath -> C + (trace) Cu (triangular)
- {whole: sheath, part: c, best: 0.99, lo: 0.985, hi: 0.995, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
- {whole: sheath, part: cu, best: 0.01, lo: 0.005, hi: 0.015, unit: kgkg, dist: triangular, quality: {Accuracy: 2.0, Completeness: 3.0}}
