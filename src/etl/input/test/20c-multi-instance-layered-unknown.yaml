id: 20c_multi_instance_layered_unknown
title: multi-instance aggregation WITH a LAYERED unknown (element bounded at two depths)
note: "BASE (unchanged copper aggregation). Two DISTINCT product instances — carA and\ncarB — are BOTH of the same class V0301030105. They have the same KIND of\nchain (product -> component -> material -> element: motor->winding->Cu and\nharness->cuwire->Cu) but DIFFERENT values per instance. The class is the plain\n(equal, unweighted) mean of its member instances — each instance counts once.\n\nPer-instance copper per kg of car (path-product of best values). NOTE windingA\ncopper is now 0.99 (the remaining 0.01 of windingA is a nickel trace, below):\n  carA: motor 0.50 * winding 0.30 * 0.99 = 0.1485\n      + harness 0.50 * cuwire 0.60 * 1.0  = 0.300    -> 0.4485\n  carB: motor 0.40 * winding 0.35 * 1.0  = 0.140\n      + harness 0.55 * cuwire 0.70 * 1.0  = 0.385    -> 0.525\n\nClass-level copper = equal (unweighted) mean over the two instances:\n  Cu(V0301030105) = (0.4485 + 0.525) / 2 = 0.486750 kg/kg\n\nLAYERED NICKEL UNKNOWN on carA (mirrors scenario 13-layered-unknowns). Nickel\nis bounded by COARSE composition statements at TWO depths, plus one known\ngranular trace:\n  * KNOWN granular ni: windingA->ni = 0.01 (windingA is highCuAlloys, a\n    copper-nickel alloy of cu 0.99 + ni 0.01, so it still conserves). The known ni path-products are:\n      - reaching motorA  = motorA->windingA (0.30) * 0.01           = 0.003\n      - reaching carA    = carA->motorA (0.50) * 0.30 * 0.01        = 0.0015\n  * COARSE motorA->ni = 0.02 (Component->Element, skips the Material level).\n    Its granular floor is the known 0.003 reaching motorA, so the\n    MOTOR-LEVEL unknown chain (motor known, material+element generic) is\n      0.02 - 0.003 = 0.017.\n  * COARSE carA->ni = 0.05 (Product->Element, skips Component+Material). The\n    motorA coarse projects up to the car as carA->motorA (0.50) * 0.02 = 0.01,\n    so the FULLY-GENERIC car-level unknown chain (component+material+element\n    generic) is\n      0.05 - 0.01 = 0.04.\nLike scenario 13, the unknown splits into DISJOINT chains by depth: a\nmotor-level chain (0.017) and a fully-generic car-level chain (0.04). None of\nthe generic unknown nodes are in the Turtle — the propagate+reconcile pipeline\nmust derive them. Coarse statements are AUTO-EXCLUDED from conservation so they\nnever overshoot. Only carA is touched; carB is the unchanged mirror.\n"
