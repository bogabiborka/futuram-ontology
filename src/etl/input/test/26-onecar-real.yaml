note: "Auto-generated from a FutuRaM composition dataset (kg/unit absolute mass, converted to per-layer kg/kg). Each (product, productionYear) is a separate instance.\n\nLevels from parameterCode: c-p (component-of-product), m-c (material-of-component), e-m (element-of-material). Each value is divided by its IMMEDIATE whole's mass to give the per-layer fraction; component structure is taken from m-c (c-p is a cross-check, since its inline material duplicates the m-c row).\n\nThe material->element layer is YEAR-INVARIANT (intrinsic chemistry, enforced within EM_YEAR_TOL): material/element nodes carry no year and each m->e statement appears once, shared by every production-year instance of its product.\n\n2 instance(s) across 1 product class(es):\n  V0301030105 / 2010: total mass 1489.4 kg\n  V0301030105 / 2011: total mass 1496.6 kg"
