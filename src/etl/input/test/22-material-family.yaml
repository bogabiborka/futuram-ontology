id: "22_material_family"
title: "MATERIAL-level aggregation in isolation (multi-layer subClass rollup, mass-weighted)"
note: |
  Isolates the MATERIAL aggregation mechanism, which differs from products /
  components: a material SUPERCLASS is the MASS-WEIGHTED combination of the
  materials under it (NOT an equal subclass mean), and it rolls up through
  EVERY layer of the material subClass hierarchy:

    pureCu, highCuAlloys ─┐
    mFamily(CuAndCuAlloys)├─→ CuAndCuAlloys ─┐
                          ┘                  ├─→ non-ferrousMetals ─→ Material
    extrudedAlAlloys ─→ AlAndAlAlloys ───────┘

  One component `block` is made of six materials from THREE families (Cu, Al,
  steel). A statement may target a leaf material (pureCu, highCuAlloys,
  extrudedAlAlloys) OR a family superclass directly (mFamily is CuAndCuAlloys).
  Every layer is a mass-weighted rollup of everything beneath it.

  Masses (conserve to 1.0):
    mPure   (pureCu)          0.30  Cu[0.98,1.00] best 0.99
    mAlloy  (highCuAlloys)    0.20  Cu[0.80,0.90] best 0.85
    mFamily (CuAndCuAlloys)   0.15  Cu[0.90,0.95] best 0.925
    mAl1    (AlAndAlAlloys)   0.20  Al[0.95,0.99] best 0.97 ; Cu[0,0.01] best 0.005
    mAl2    (extrudedAlAlloys)0.10  Al[0.90,0.95] best 0.925
    mSteel  (steelAndSteelAlloys) 0.05  Fe (ferrous, separate family)

  Mass-weighted Cu content per LAYER (aggregate_material_family(family,'Copper')):
    CuAndCuAlloys  Cu = (0.30*0.99 + 0.20*0.85 + 0.15*0.925)/0.65  best 0.93192
                       lo 0.90615  hi 0.95769
    non-ferrousMetals Cu = pool Cu-fam + Al-fam (Al carries trace Cu):
                       best 0.63868  lo 0.62000  hi 0.65737
    non-ferrousMetals Al = mass-weighted over the same non-ferrous set:
                       best 0.30158  lo 0.29474  hi 0.30842
  Higher family layers pool MORE materials; the mass-weighting and min/max
  intervals propagate up the subClass tree.

