id: "20_multi_instance_class"
title: "two instances of the SAME class, aggregated to the class (copper)"
note: |
  THE keystone aggregation scenario. Two DISTINCT product instances — carA and
  carB — are BOTH of the same class V0301030105. They have the same KIND of
  chain (product -> component -> material -> element: motor->winding->Cu and
  harness->cuwire->Cu) but DIFFERENT values per instance. The class is the plain
  (equal, unweighted) mean of its member instances — each instance counts once.

  Per-instance copper per kg of car (path-product of best values):
    carA: motor 0.50 * winding 0.30 * 1.0 = 0.150
        + harness 0.50 * cuwire 0.60 * 1.0 = 0.300   -> 0.450
    carB: motor 0.40 * winding 0.35 * 1.0 = 0.140
        + harness 0.55 * cuwire 0.70 * 1.0 = 0.385   -> 0.525

  Class-level copper = equal (unweighted) mean over the two instances:
    Cu(V0301030105) = (0.450 + 0.525) / 2 = 0.487500 kg/kg

  This is the ClassCompositionStatement the Monte-Carlo aggregator must
  reproduce (best/central value; MC adds the spread). Every instance conserves
  independently; the two share ONLY their class, not their individuals.

provenance:
  source: "FutuRaM composition datasheet (test)"
  agent: "FutuRaM test organisation"
  production: "forming"
  validFrom: "2020-01-01"
  validUntil: "2026-12-31"

nodes:
  # --- carA instance ---
  carA: {level: Product, class: V0301030105_Y2020, itemMass: 1000.0}
  motorA: {level: Component, class: elvElectricMotor_Y2020, itemMass: 50.0}
  harnessA: {level: Component, class: wiringHarness_Y2020, itemMass: 50.0}
  windingA: {level: Material, class: pureCu}
  steelA: {level: Material, class: steelAndSteelAlloys}
  cuwireA: {level: Material, class: pureCu}
  sheathA: {level: Material, class: thermoplastics}
  # --- carB instance (same classes, different individuals) ---
  carB: {level: Product, class: V0301030105_Y2020, itemMass: 1000.0}
  motorB: {level: Component, class: elvElectricMotor_Y2020, itemMass: 50.0}
  harnessB: {level: Component, class: wiringHarness_Y2020, itemMass: 50.0}
