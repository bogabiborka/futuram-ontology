# Hand-maintained — the four special SPARQL competency-query questions of the
# domain benchmark. Three reproduce the SI result tables (SI-5/6/7); the fourth is
# the embedded-CONTROLLERS recycling-route question (its answer is the metal-wheel
# recovery table / screenshot, given by class IRI: futuram:Copper, etc.).
#
# These questions ALREADY ask for the uncertainty in their own VERBATIM text, so each
# is ONE case scoring uncertainty — there is NO separate `__valunc` twin (that would
# fire a redundant second query and double-ask). The companion competency questions
# (the SI's ten NL questions) live in domain-competency.yaml.
cases:
  - id: cu_by_bev_segment_2030
    question: 'Rank all battery-electric vehicles projected to be produced in 2030 according to their copper content, reporting both the mean value and the associated uncertainty (e.g., standard deviation) in decreasing order.'
    source: 'SI-5 (Cu by BEV segment, 2030)'
    score_uncertainty: true
    ranked: true   # "in decreasing order" — answer items must be in DESCENDING value order
    # COMPLETED to all 13 BEV body segments (data-faithful): the SI-5 table printed
    # only the top 10, but the live data has 13. The 3 smallest (JB/B/A = …0102,
    # …0201, …0101) were added from the endpoint so "rank ALL" is scored against the
    # full data. values + uncertainty are in DESCENDING order (the ranking).
    expected:
      unit: kg
      values:
        "https://www.purl.org/futuram#V0301030206_Y2030": 78.27
        "https://www.purl.org/futuram#V0301030205_Y2030": 70.88
