  # Special SPARQL question (NOT in the SI doc). Parallels the SI-9 embedded-
  # electronics recycling question, but scoped to the embedded CONTROLLERS
  # subcomponent. Answer = the metal-wheel recovery table, keyed by element class
  # IRI (futuram:Copper, etc.). The recoverable quantity = the controllers'
  # element mass; values data-verified
  # against the served fq endpoint (std BEV V0301030000, 2025). Its verbatim text
  # already asks for the uncertainty, so this is ONE uncertainty-scoring case too.
  - id: crm_recovered_embedded_controllers_std_bev_2025
    question: 'List the potential recycling routes in case of the embedded controllers in standard, battery-electric vehicle from 2025, together with the quantities of critical raw materials recovered, including both mean values and associated uncertainties.'
    source: 'New SPARQL Q (embedded controllers recycling routes; screenshot/metal-wheel; values data-verified on the fq endpoint)'
    score_uncertainty: true
    expected:
      unit: kg
      values:
        "https://www.purl.org/futuram#Copper": 0.795906
        "https://www.purl.org/futuram#Aluminium": 0.122864
        "https://www.purl.org/futuram#Palladium": 0.000432581
      uncertainty:
        "https://www.purl.org/futuram#Copper": 0.137855
        "https://www.purl.org/futuram#Aluminium": 0.0212806
        "https://www.purl.org/futuram#Palladium": 0.0000749253
      routes:
        - element:    "https://www.purl.org/futuram#Copper"
          base_metal: "https://www.purl.org/futuram#Copper"
          route:      "https://purl.org/metalwheel#smelt_refine"
        - element:    "https://www.purl.org/futuram#Copper"
          base_metal: "https://www.purl.org/futuram#Lead"
          route:      "https://purl.org/metalwheel#roast-leach_electrowinning_RLE_smeltfumerefine"
        - element:    "https://www.purl.org/futuram#Copper"
          base_metal: "https://www.purl.org/futuram#Tin"
          route:      "https://purl.org/metalwheel#smelt_fume_refine"
        - element:    "https://www.purl.org/futuram#Copper"
          base_metal: "https://www.purl.org/futuram#Zinc"
          route:      "https://purl.org/metalwheel#roast-leach_electrowinning_RLE_smeltfumerefine"
        - element:    "https://www.purl.org/futuram#Aluminium"
          base_metal: "https://www.purl.org/futuram#Aluminium"
          route:      "https://purl.org/metalwheel#electrolysis_remelt_refine"
        - element:    "https://www.purl.org/futuram#Palladium"
          base_metal: "https://www.purl.org/futuram#Copper"
          route:      "https://purl.org/metalwheel#smelt_refine"
        - element:    "https://www.purl.org/futuram#Palladium"
          base_metal: "https://www.purl.org/futuram#Nickel"
          route:      "https://purl.org/metalwheel#smelt_refine"
